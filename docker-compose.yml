services:
  backend:
    build:
      context: ./backend
    container_name: backend
    expose:
      - "8080"
    networks:
      - app_net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net
    restart: unless-stopped

networks:
  app_net:
    name: effective_mobile_net

